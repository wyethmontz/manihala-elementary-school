<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'none';">
<meta name="referrer" content="no-referrer">
<title>MOOE — Bimonthly Breakdown</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="wrap">
  <h1 style="margin-top:26px">MOOE — Bimonthly Breakdown</h1>
  <p class="meta">Maintenance and Other Operating Expenses: amount downloaded vs. recorded expenses, every category, every period.</p>

  <section>
    <div class="panel">
      <div class="legend">
        <span><span class="swatch" style="background:var(--series-1)"></span>Amount Downloaded</span>
        <span><span class="swatch" style="background:var(--series-2)"></span>Expenses Recorded</span>
      </div>
      <div class="grouped-chart" id="groupedChart"></div>
      <div class="group-labels" id="groupLabels"></div>
      <div class="callout" id="callout"></div>
    </div>
  </section>

  <section>
    <h2>Full Category Breakdown</h2>
    <div class="panel table-wrap">
      <table id="detailTable"></table>
    </div>
  </section>
</div>

<script src="data.js"></script>
<script src="nav.js"></script>
<script src="mooe-page.js"></script>
</body>
</html>
