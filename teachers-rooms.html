<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'none';">
<meta name="referrer" content="no-referrer">
<title>Teachers vs. Rooms</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="wrap">
  <h1 style="margin-top:26px">Teachers vs. Rooms</h1>
  <p class="meta">Number of teachers against number of classrooms, by grade level.</p>

  <section>
    <div id="saveBar" style="display:none;align-items:center;gap:12px;margin-bottom:10px">
      <button id="addRowBtn" style="background:transparent;border:1px solid var(--border);color:var(--text-primary);padding:8px 14px;border-radius:6px;font-size:13px;cursor:pointer">+ Add Grade Level</button>
      <button id="saveBtn" style="background:var(--series-1);border:none;color:#fff;padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer">Save Changes</button>
      <span id="saveStatus" style="font-size:12px;color:var(--text-secondary)"></span>
    </div>
    <div class="panel table-wrap" id="content"></div>
  </section>
</div>

<script src="data.js"></script>
<script src="nav.js"></script>
<script src="teachers-rooms-page.js"></script>
</body>
</html>
